trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
# 1️⃣ Use Python
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'

# 2️⃣ Install dependencies
- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    playwright install --with-deps
  displayName: Install dependencies

# 3️⃣ Run Playwright tests & generate reports
- script: |
    mkdir -p results/html results/xml
    pytest tests \
        --junitxml=results/xml/report.xml \
        --html=results/html/report.html \
        --self-contained-html -v
  displayName: Run tests & generate reports

# 4️⃣ Publish JUnit XML for Azure DevOps Test tab
- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'results/xml/report.xml'
    mergeTestResults: true
    failTaskOnFailedTests: true
  displayName: Publish test results

# 5️⃣ Publish HTML report as pipeline artifact
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: 'results/html'
    artifact: 'PlaywrightHTMLReport'
    publishLocation: 'pipeline'
  displayName: Publish HTML report
